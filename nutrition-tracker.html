<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>食事ノート</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

// ── 定数 ──────────────────────────────────────────────────────────────────
const DEFAULT_GOALS = {
  calories:2000, protein:60, fat:55, carbs:250, fiber:21,
};
// 表示対象：カロリー・PFC・食物繊維の5項目
const NUTRIENTS = [
  { key:"calories", label:"エネルギー", unit:"kcal", color:"#f97316", bg:"#fff7ed", icon:"🔥" },
  { key:"protein",  label:"たんぱく質", unit:"g",    color:"#3b82f6", bg:"#eff6ff", icon:"💪" },
  { key:"fat",      label:"脂質",       unit:"g",    color:"#f59e0b", bg:"#fffbeb", icon:"🧈" },
  { key:"carbs",    label:"炭水化物",   unit:"g",    color:"#8b5cf6", bg:"#f5f3ff", icon:"🍚" },
  { key:"fiber",    label:"食物繊維",   unit:"g",    color:"#22c55e", bg:"#f0fdf4", icon:"🥦" },
];

// 期間フィルター
function getMealsForPeriod(period, meals) {
  const now = new Date();
  let cutoff;
  if (period === "today") {
    cutoff = new Date(now); cutoff.setHours(0,0,0,0);
  } else if (period === "week") {
    cutoff = new Date(now); cutoff.setDate(cutoff.getDate()-6); cutoff.setHours(0,0,0,0);
  } else if (period === "month") {
    cutoff = new Date(now.getFullYear(), now.getMonth(), 1);
  } else if (period === "year") {
    cutoff = new Date(now.getFullYear(), 0, 1);
  }
  return meals.filter(m => m.id >= cutoff.getTime());
}

const PERIOD_LABELS = [
  { id:"today", label:"今日" },
  { id:"week",  label:"1週間" },
  { id:"month", label:"今月" },
  { id:"year",  label:"今年" },
];

// ── Gemini API ─────────────────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

const GEMINI_MODELS = [
  "gemini-2.0-flash-lite",
  "gemini-2.5-flash",
  "gemini-2.0-flash",
  "gemini-1.5-flash",
  "gemini-1.5-flash-latest",
];

async function callGemini(parts, apiKey, model) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{ parts }], generationConfig:{ maxOutputTokens:1024 }}) }
  );
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    const err = new Error(e?.error?.message || `APIエラー(${res.status})`);
    err.status = res.status;
    throw err;
  }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  if (!text) throw new Error("応答が空でした");
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("JSON解析に失敗しました");
  return JSON.parse(m[0]);
}

async function analyzeFood(base64Image, mimeType, apiKey, userMemo) {
  const hasImage = !!base64Image;
  const hasMemo  = !!(userMemo && userMemo.trim());
  let prompt;
  if (hasImage && hasMemo) {
    prompt = `この食事の写真と補足情報を合わせて分析し、栄養情報をJSON形式で返してください。複数の料理がある場合は合計値を返してください。\n【補足情報】\n${userMemo.trim()}\n{"dish_name":"料理名","calories":数値,"protein":数値,"fat":数値,"carbs":数値,"sugar":数値,"salt":数値,"fiber":数値,"notes":"補足"}\nJSONのみ返してください。`;
  } else if (hasImage) {
    prompt = `この食事の写真を分析して栄養情報をJSON形式で返してください。複数の料理がある場合は合計値を返してください。\n{"dish_name":"料理名","calories":数値,"protein":数値,"fat":数値,"carbs":数値,"sugar":数値,"salt":数値,"fiber":数値,"notes":"補足"}\nJSONのみ返してください。`;
  } else {
    prompt = `以下の食事内容から栄養情報を推定しJSON形式で返してください。\n【食事内容】\n${userMemo.trim()}\n{"dish_name":"料理名","calories":数値,"protein":数値,"fat":数値,"carbs":数値,"sugar":数値,"salt":数値,"fiber":数値,"notes":"補足"}\nJSONのみ返してください。`;
  }
  const parts = hasImage
    ? [{ inline_data:{ mime_type:mimeType, data:base64Image }}, { text:prompt }]
    : [{ text:prompt }];

  let lastError;
  for (const model of GEMINI_MODELS) {
    try {
      return await callGemini(parts, apiKey, model);
    } catch(e) {
      lastError = e;
      // 404はモデルが存在しない→次のモデルへ。429/503は少し待って次のモデルへ
      if (e.status === 429 || e.status === 503 || e.status === 500) {
        await sleep(2000);
      }
      // それ以外のエラー（401など）はリトライ不要
      if (e.status === 401 || e.status === 400) throw e;
    }
  }
  throw lastError;
}

// ── ユーティリティ ─────────────────────────────────────────────────────────
function todayStr() { return new Date().toLocaleDateString("ja-JP",{month:"2-digit",day:"2-digit"}); }
function processImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const img = new Image();
      img.onload = () => {
        const MAX=1600; let w=img.naturalWidth, h=img.naturalHeight;
        if(w>MAX||h>MAX){ if(w>=h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
        const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        const jpegUrl=canvas.toDataURL("image/jpeg",0.85);
        resolve({ previewUrl:jpegUrl, base64:jpegUrl.split(",")[1], mimeType:"image/jpeg" });
      };
      img.onerror = () => resolve({ previewUrl:dataUrl, base64:dataUrl.split(",")[1], mimeType:file.type||"image/jpeg" });
      img.src = dataUrl;
    };
    reader.onerror = () => reject(new Error("ファイル読み込みに失敗しました"));
    reader.readAsDataURL(file);
  });
}
function sumNutrients(meals) {
  const z={calories:0,protein:0,fat:0,carbs:0,fiber:0};
  return meals.reduce((a,m)=>{ Object.keys(z).forEach(k=>a[k]+=(m.nutrients[k]||0)); return a; }, z);
}
function pct(val, goal) { return Math.min((val/goal)*100, 100); }
function statusColor(val, goal) {
  const r = val/goal;
  if (r < 0.5) return "#94a3b8";
  if (r <= 1.0) return "#22c55e";
  return "#ef4444";
}
function statusLabel(val, goal) {
  const r = val/goal;
  if (r < 0.5) return "不足";
  if (r <= 1.0) return "適正";
  return "過剰";
}

// ── SVGバーチャート ────────────────────────────────────────────────────────
function BarChartSVG({ data, dataKey, color, goal }) {
  const W=340, H=150, PL=28, PR=8, PT=10, PB=28;
  const iW=W-PL-PR, iH=H-PT-PB;
  const max=Math.max(...data.map(d=>d[dataKey]||0), goal||1)*1.15;
  const bW=Math.floor(iW/data.length)-5;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      {[0,0.5,1].map(r=>{
        const y=PT+iH*(1-r);
        return <g key={r}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#f1f5f9" strokeWidth="1.5"/>
          <text x={PL-3} y={y+4} textAnchor="end" fontSize="8" fill="#cbd5e1">{(max*r).toFixed(0)}</text>
        </g>;
      })}
      {goal && <line x1={PL} y1={PT+iH*(1-goal/max)} x2={W-PR} y2={PT+iH*(1-goal/max)}
        stroke="#ef4444" strokeWidth="1.5" strokeDasharray="5,3" opacity="0.5"/>}
      {data.map((d,i)=>{
        const val=d[dataKey]||0, bH=val>0?Math.max((val/max)*iH,3):0;
        const x=PL+i*(iW/data.length)+(iW/data.length-bW)/2;
        const y=PT+iH-bH;
        const fill=val===0?"#e2e8f0":val>goal?"#fca5a5":color;
        return <g key={i}>
          <rect x={x} y={y} width={bW} height={bH} rx="4" fill={fill}/>
          <text x={x+bW/2} y={H-PB+13} textAnchor="middle" fontSize="8.5" fill="#94a3b8">
            {d.date.replace(/\d+\//,"")}
          </text>
        </g>;
      })}
    </svg>
  );
}

// ── メインアプリ ────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("record");
  const [apiKey, setApiKey] = useState(()=>sessionStorage.getItem("gemini_key")||"");
  const [imagePreview, setImagePreview] = useState(null);
  const [imageData, setImageData] = useState(null);
  const [memo, setMemo] = useState("");
  const [analyzing, setAnalyzing] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [meals, setMeals] = useState(() => {
    try { const s=localStorage.getItem("shokuji_meals"); return s?JSON.parse(s):[]; }
    catch { return []; }
  });
  const [goals, setGoals] = useState(() => {
    try { const s=localStorage.getItem("shokuji_goals"); return s?{...DEFAULT_GOALS,...JSON.parse(s)}:DEFAULT_GOALS; }
    catch { return DEFAULT_GOALS; }
  });
  const [exportDone, setExportDone] = useState(false);
  const fileInputRef = useRef();
  const canAnalyze = !!(imageData || memo.trim());

  const saveGoals = useCallback((newGoals) => {
    setGoals(newGoals);
    try { localStorage.setItem("shokuji_goals", JSON.stringify(newGoals)); }
    catch(e) { console.warn(e); }
  }, []);

  // meals変更のたびlocalStorageに保存（画像はデータ量削減のため除外）
  const saveMeals = useCallback((newMeals) => {
    setMeals(newMeals);
    try {
      const forStorage = newMeals.map(m => ({ ...m, imagePreview: null }));
      localStorage.setItem("shokuji_meals", JSON.stringify(forStorage));
    } catch(e) {
      console.warn("localStorage保存失敗:", e);
    }
  }, []);

  // JSONエクスポート
  const handleExport = () => {
    const json = JSON.stringify(meals.map(m => ({ ...m, imagePreview: null })), null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `食事記録_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setExportDone(true);
    setTimeout(() => setExportDone(false), 2000);
  };

  const handleFile = useCallback(async(file) => {
    if(!file) return;
    setResult(null); setError(""); setImagePreview(null); setImageData(null);
    try {
      const {previewUrl,base64,mimeType} = await processImageFile(file);
      setImagePreview(previewUrl); setImageData({base64,mimeType});
    } catch(e) { setError(e.message); }
  }, []);

  const handleAnalyze = async() => {
    if(!canAnalyze) return;
    if(!apiKey){ setTab("settings"); return; }
    setAnalyzing(true); setError("");
    try { setResult(await analyzeFood(imageData?.base64||null, imageData?.mimeType||"image/jpeg", apiKey, memo)); }
    catch(e){ setError(e.message); }
    finally{ setAnalyzing(false); }
  };

  const handleSave = () => {
    if(!result) return;
    const now = new Date();
    const newMeal = {
      id: now.getTime(),
      dateStr: todayStr(),
      timeStr: now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),
      imagePreview,
      dish_name: result.dish_name,
      notes: result.notes||"",
      memo,
      nutrients:{
        calories:result.calories||0, protein:result.protein||0, fat:result.fat||0,
        carbs:result.carbs||0, sugar:result.sugar||0, salt:result.salt||0, fiber:result.fiber||0,
      },
    };
    saveMeals([newMeal, ...meals]);
    setImagePreview(null); setImageData(null); setResult(null); setMemo("");
    setTab("stats");
  };



  // ── RECORD TAB ─────────────────────────────────────────────────────────
  const RecordTab = () => (
    <div style={{padding:"20px 16px 110px", overflowY:"auto", flex:1}}>

      {/* 写真エリア */}
      <div className="card" style={{marginBottom:14, overflow:"hidden",
        border: imagePreview ? "none" : "2px dashed #d1fae5"}}>
        {imagePreview ? (
          <div style={{position:"relative"}}>
            <img src={imagePreview} alt="food"
              style={{width:"100%", maxHeight:260, objectFit:"cover", display:"block"}}/>
            <button onClick={()=>{setImagePreview(null);setImageData(null);setResult(null);fileInputRef.current.click();}}
              style={{position:"absolute",top:10,right:10,background:"rgba(0,0,0,0.45)",
                border:"none",borderRadius:20,color:"#fff",fontSize:12,fontWeight:600,
                padding:"6px 12px",cursor:"pointer",backdropFilter:"blur(4px)"}}>
              変更
            </button>
          </div>
        ) : (
          <div onClick={()=>fileInputRef.current.click()}
            style={{padding:"32px 20px",textAlign:"center",cursor:"pointer",background:"#f0fdf4"}}>
            <div style={{width:64,height:64,borderRadius:20,background:"#dcfce7",
              display:"flex",alignItems:"center",justifyContent:"center",
              margin:"0 auto 14px",fontSize:28}}>📷</div>
            <div style={{fontSize:15,fontWeight:700,color:"#16a34a",marginBottom:4}}>
              写真を追加する
            </div>
            <div style={{fontSize:12,color:"#86efac"}}>タップまたはドラッグ＆ドロップ</div>
          </div>
        )}
      </div>
      <input ref={fileInputRef} type="file" accept="image/*"
        style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>

      {/* 補足メモ */}
      {!result && (
        <div className="card" style={{marginBottom:14, padding:"16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:32,height:32,borderRadius:10,background:"#f0fdf4",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📝</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>補足メモ</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>
                {imagePreview ? "量・調理法を追加すると精度アップ" : "写真がない場合はこちらに食事内容を記入"}
              </div>
            </div>
            <div style={{marginLeft:"auto",fontSize:11,color:"#94a3b8",fontWeight:500}}>任意</div>
          </div>
          <textarea value={memo} onChange={e=>setMemo(e.target.value)}
            placeholder={imagePreview
              ? "例：ご飯は大盛り、鶏肉は200g程度、ドレッシング大さじ2杯"
              : "例：牛丼（並盛）・味噌汁・サラダ\nコンビニのおにぎり2個とサンドイッチ"}
            rows={3}
            style={{width:"100%",padding:"12px",borderRadius:12,
              border:"1.5px solid #e2e8f0",fontSize:13,color:"#334155",
              resize:"vertical",lineHeight:1.7,fontFamily:"inherit",background:"#f8fafc"}}/>
        </div>
      )}

      {/* エラー */}
      {error && (
        <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:14,
          padding:"12px 16px",color:"#dc2626",fontSize:13,marginBottom:14,display:"flex",gap:8}}>
          <span>⚠️</span><span>{error}</span>
        </div>
      )}

      {/* 分析ボタン */}
      {!result && canAnalyze && (
        <button onClick={handleAnalyze} disabled={analyzing}
          style={{width:"100%",padding:"16px 0",borderRadius:16,border:"none",
            background:analyzing?"#bbf7d0":"linear-gradient(135deg,#22c55e,#16a34a)",
            color:"#fff",fontSize:15,fontWeight:700,cursor:analyzing?"not-allowed":"pointer",
            boxShadow:analyzing?"none":"0 6px 20px rgba(34,197,94,0.35)",
            letterSpacing:"0.02em",marginBottom:14,transition:"all 0.2s"}}>
          {analyzing ? "🔍　分析中…（失敗時は自動で再試行します）" : imagePreview ? "✨　写真＋メモで分析する" : "✨　メモから分析する"}
        </button>
      )}

      {/* 分析結果 */}
      {result && (
        <div style={{marginBottom:14}}>
          {/* 料理名 */}
          <div className="card" style={{padding:"18px 20px",marginBottom:12}}>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,letterSpacing:"0.06em",marginBottom:4}}>
              AI分析結果
            </div>
            <div style={{fontSize:19,fontWeight:800,color:"#0f172a",marginBottom:4}}>
              🍱 {result.dish_name}
            </div>
            {result.notes && (
              <div style={{fontSize:12,color:"#64748b",lineHeight:1.6,
                background:"#f8fafc",borderRadius:10,padding:"8px 12px",marginTop:8}}>
                {result.notes}
              </div>
            )}
          </div>

          {/* カロリー大きく */}
          <div className="card" style={{padding:"20px",marginBottom:12,
            background:"linear-gradient(135deg,#fff7ed,#ffedd5)"}}>
            <div style={{fontSize:12,color:"#ea580c",fontWeight:600,marginBottom:4}}>🔥 エネルギー</div>

              </span>

            <div style={{marginTop:12,background:"rgba(255,255,255,0.6)",borderRadius:8,height:8,overflow:"hidden"}}>
              <div style={{width:`${pct(result.calories||0,goals.calories)}%`,height:"100%",
                background:"linear-gradient(90deg,#fb923c,#ea580c)",borderRadius:8,transition:"width 0.6s"}}/>
            </div>
          </div>

          {/* PFC+その他 グリッド */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {NUTRIENTS.filter(n=>n.key!=="calories").map(n=>(
              <div key={n.key} className="card" style={{padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>

                </div>
                <div style={{background:"#f1f5f9",borderRadius:6,height:6,overflow:"hidden"}}>
                  <div style={{width:`${pct(result[n.key]||0,goals[n.key])}%`,
                    height:"100%",background:n.color,borderRadius:6,transition:"width 0.6s"}}/>
                </div>
                <div style={{fontSize:10,color:"#94a3b8",marginTop:4}}>
                  目標 {goals[n.key]}{n.unit}
                </div>
              </div>
            ))}
          </div>

          {/* 保存ボタン */}
          <button onClick={handleSave}
            style={{width:"100%",padding:"16px 0",borderRadius:16,border:"none",
              background:"linear-gradient(135deg,#6366f1,#8b5cf6)",
              color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",
              boxShadow:"0 6px 20px rgba(99,102,241,0.35)",letterSpacing:"0.02em"}}>
            ✅　記録に保存する
          </button>
        </div>
      )}

      {/* APIキー未設定ガイド */}
      {!apiKey && !imagePreview && !memo && (
        <div className="card" style={{padding:"18px 20px",borderLeft:"4px solid #22c55e"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#166534",marginBottom:6}}>
            🎉 完全無料で使えます
          </div>
          <div style={{fontSize:12,color:"#4b5563",lineHeight:1.8,marginBottom:12}}>
            まず「設定」タブからGoogle Gemini APIキーを設定してください。<br/>
            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer"
              style={{color:"#16a34a",fontWeight:700}}>aistudio.google.com</a> でGoogleアカウントで即取得・クレカ不要。
          </div>
          <button onClick={()=>setTab("settings")}
            style={{width:"100%",padding:"12px 0",borderRadius:12,border:"none",
              background:"linear-gradient(135deg,#22c55e,#16a34a)",
              color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            ⚙️ 設定タブへ移動する
          </button>
        </div>
      )}
    </div>
  );

  // ── STATS TAB（統計・期間切り替え＋グラフ統合）────────────────────────
  const StatsTab = () => {
    const [period, setPeriod] = useState("today");
    const periodMeals = getMealsForPeriod(period, meals);
    const total = sumNutrients(periodMeals);
    const days = period==="today" ? 1 : period==="week" ? 7 : period==="month"
      ? new Date().getDate() : new Date().getDayOfYear?.() || Math.ceil((Date.now() - new Date(new Date().getFullYear(),0,1)) / 86400000);
    const isMultiDay = period !== "today";
    const periodLabel = PERIOD_LABELS.find(p=>p.id===period)?.label || "";

    return (
      <div style={{padding:"0 0 110px",overflowY:"auto",flex:1}}>
        {/* 期間セレクター */}
        <div style={{background:"#fff",padding:"14px 16px",borderBottom:"1px solid #f1f5f9",
          display:"flex",gap:8,flexShrink:0}}>
          {PERIOD_LABELS.map(p=>(
            <button key={p.id} onClick={()=>setPeriod(p.id)}
              style={{flex:1,padding:"8px 0",borderRadius:12,border:"none",cursor:"pointer",
                fontWeight:700,fontSize:13,transition:"all 0.2s",
                background: period===p.id ? "linear-gradient(135deg,#22c55e,#16a34a)" : "#f1f5f9",
                color: period===p.id ? "#fff" : "#64748b"}}>
              {p.label}
            </button>
          ))}
        </div>

        <div style={{padding:"16px 16px 0"}}>
          {/* カロリーサマリー */}
          <div className="card" style={{padding:"20px",marginBottom:14,
            background:"linear-gradient(135deg,#1e293b,#334155)"}}>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,letterSpacing:"0.08em",marginBottom:4}}>
              {periodLabel}の合計エネルギー{isMultiDay && <span style={{color:"#94a3b8",fontWeight:400}}> （{periodMeals.length}食）</span>}
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:14}}>
              <span style={{fontSize:48,fontWeight:800,color:"#fff",lineHeight:1}}>
                {total.calories.toFixed(0)}
              </span>
              <span style={{fontSize:15,color:"#94a3b8"}}>kcal</span>
              {isMultiDay && periodMeals.length > 0 && (
                <span style={{fontSize:12,color:"#64748b",marginLeft:4}}>
                  （1食平均 {Math.round(total.calories/periodMeals.length)} kcal）
                </span>
              )}
            </div>
            {!isMultiDay && (
              <>
                <div style={{background:"rgba(255,255,255,0.12)",borderRadius:10,height:8,overflow:"hidden"}}>
                  <div style={{width:`${pct(total.calories,goals.calories)}%`,height:"100%",
                    background:"linear-gradient(90deg,#4ade80,#22c55e)",borderRadius:10,transition:"width 0.6s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                  <span style={{fontSize:10,color:"#475569"}}>0</span>
                  <span style={{fontSize:10,color:"#475569"}}>目標 {goals.calories} kcal</span>
                </div>
              </>
            )}
          </div>

          {/* PFC + 食物繊維 バー */}
          {periodMeals.length > 0 && (
            <div className="card" style={{padding:"18px 20px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:14}}>
                栄養バランス
              </div>
              {NUTRIENTS.filter(n=>n.key!=="calories").map(n=>{
                const val = total[n.key]||0;
                const goal = isMultiDay ? goals[n.key] * periodMeals.length : goals[n.key];
                const sc = statusColor(val, goal);
                const sl = statusLabel(val, goal);
                return (
                  <div key={n.key} style={{marginBottom:13}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:15}}>{n.icon}</span>
                        <span style={{fontSize:13,color:"#334155",fontWeight:600}}>{n.label}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:12,color:"#64748b"}}>
                          {val.toFixed(1)}{n.unit}
                        </span>
                        {!isMultiDay && (
                          <span style={{fontSize:10,fontWeight:700,color:"#fff",background:sc,
                            padding:"2px 9px",borderRadius:20}}>{sl}</span>
                        )}
                      </div>
                    </div>
                    <div style={{background:"#f1f5f9",borderRadius:8,height:9,overflow:"hidden"}}>
                      <div style={{width:`${pct(val,goal)}%`,height:"100%",
                        background:`linear-gradient(90deg,${n.color}99,${n.color})`,
                        borderRadius:8,transition:"width 0.6s"}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* 食事リスト */}
          <div style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:10}}>
            食事記録
            <span style={{color:"#94a3b8",fontWeight:500,fontSize:12,marginLeft:6}}>
              {periodLabel} · {periodMeals.length}件
            </span>
          </div>

          {/* 食事リスト */}
          {periodMeals.length===0 ? (
            <div className="card" style={{padding:"40px 20px",textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:44,marginBottom:12}}>🥗</div>
              <div style={{fontSize:14,fontWeight:600,color:"#334155",marginBottom:4}}>記録がありません</div>
              <div style={{fontSize:12,color:"#94a3b8"}}>「記録する」タブから食事を追加しましょう</div>
            </div>
          ) : periodMeals.map(m=>(
            <div key={m.id} className="card" style={{marginBottom:10,overflow:"hidden",display:"flex"}}>
              {m.imagePreview && (
                <img src={m.imagePreview} alt="" style={{width:80,objectFit:"cover",flexShrink:0}}/>
              )}
              <div style={{padding:"12px 14px",flex:1,minWidth:0}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>{m.dateStr} {m.timeStr||""}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:8,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {m.dish_name}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {NUTRIENTS.map(n=>(
                    <span key={n.key} style={{fontSize:11,fontWeight:700,color:n.color,
                      background:n.bg,padding:"2px 8px",borderRadius:20}}>
                      {n.key==="calories"
                        ? `${Math.round(m.nutrients[n.key])}${n.unit}`
                        : `${n.label} ${(m.nutrients[n.key]||0).toFixed(1)}${n.unit}`}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          ))}

          {/* 直近7日グラフ（1週間以上の期間のみ表示） */}
          {period !== "today" && (() => {
            const last7=[];
            for(let i=6;i>=0;i--){
              const d=new Date(); d.setDate(d.getDate()-i);
              const ds=d.toLocaleDateString("ja-JP",{month:"2-digit",day:"2-digit"});
              const dm=meals.filter(m=>m.dateStr===ds);
              last7.push({date:ds,...sumNutrients(dm),count:dm.length});
            }
            const activeDays=last7.filter(d=>d.count>0);
            const avg={};
            NUTRIENTS.forEach(n=>{
              avg[n.key]=activeDays.length?activeDays.reduce((s,d)=>s+(d[n.key]||0),0)/activeDays.length:0;
            });
            return (
              <>
                {/* 達成率サマリー */}
                {activeDays.length > 0 && (
                  <div className="card" style={{padding:"18px 20px",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:14}}>
                      📊 直近7日の目標達成率
                      <span style={{fontSize:11,color:"#94a3b8",fontWeight:400,marginLeft:6}}>（{activeDays.length}日分）</span>
                    </div>
                    {NUTRIENTS.map(n=>{
                      const ach=activeDays.length?Math.round((avg[n.key]/goals[n.key])*100):null;
                      const col=!ach?"#94a3b8":ach<50?"#94a3b8":ach<=110?"#22c55e":"#ef4444";
                      const lbl=!ach?"データなし":ach<50?"不足傾向":ach<=110?"良好":"過多傾向";
                      return (
                        <div key={n.key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                          <div style={{width:32,height:32,borderRadius:10,background:n.bg,
                            display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>
                            {n.icon}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                              <span style={{fontSize:12,fontWeight:600,color:"#334155"}}>{n.label}</span>
                              <div style={{display:"flex",alignItems:"center",gap:6}}>
                                <span style={{fontSize:11,color:"#64748b"}}>平均 {avg[n.key].toFixed(n.key==="calories"?0:1)}{n.unit}</span>
                                <span style={{fontSize:10,fontWeight:700,color:"#fff",background:col,padding:"2px 8px",borderRadius:20}}>{lbl}</span>
                              </div>
                            </div>
                            <div style={{background:"#f1f5f9",borderRadius:6,height:7,overflow:"hidden"}}>
                              <div style={{width:`${Math.min(ach||0,100)}%`,height:"100%",background:col,borderRadius:6}}/>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {/* カロリー推移グラフ */}
                <div className="card" style={{padding:"16px 12px",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#0f172a",marginBottom:8}}>
                    🔥 カロリー推移（直近7日）
                  </div>
                  <BarChartSVG data={last7} dataKey="calories" color="#f97316" goal={goals.calories}/>
                </div>
              </>
            );
          })()}
        </div>
      </div>
    );
  };

  // ── SETTINGS TAB ──────────────────────────────────────────────────────
  const SettingsTab = () => {

    const firstDate = meals.length ? meals[meals.length-1].dateStr : null;

    const handleSaveGoals = () => {
      const parsed = {};
      NUTRIENTS.forEach(n => { parsed[n.key] = parseFloat(goalInputs[n.key]) || DEFAULT_GOALS[n.key]; });
      saveGoals(parsed);
      setGoalSaved(true);
      setTimeout(() => setGoalSaved(false), 2000);
    };

    const handleSaveKey = () => {
      const k = localInput.trim();
      if (!k) return;
      setApiKey(k);
      sessionStorage.setItem("gemini_key", k);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);

    const handleClearData = () => {

            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#0f172a"}}>AI分析 APIキー</div>

            <div style={{marginLeft:"auto"}}>

              </span>
            </div>
          </div>

          <div style={{fontSize:12,color:"#64748b",lineHeight:1.8,marginBottom:14,
            background:"#f8fafc",borderRadius:12,padding:"12px 14px"}}>

            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer"
              style={{color:"#6366f1",fontWeight:700}}>aistudio.google.com</a> にアクセスし、

          <div style={{position:"relative",marginBottom:10}}>
            <input

              onKeyDown={e=>e.key==="Enter"&&handleSaveKey()}
              style={{width:"100%",padding:"13px 44px 13px 14px",borderRadius:12,

            <button onClick={()=>setShowKey(v=>!v)}

          {NUTRIENTS.map(n=>(
            <div key={n.key} style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>

              display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🍽️</div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#0f172a"}}>食事ノート</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>AI栄養管理アプリ</div>
            </div>
          </div>
          {[

          ))}
        </div>
      </div>
    );

  const TABS = [

    { id:"settings", icon:"⚙️", label:"設定" },

          <div style={{width:36,height:36,borderRadius:12,

            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🍽️</div>
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#0f172a",lineHeight:1}}>食事ノート</div>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>AI栄養管理アプリ</div>
          </div>
        </div>
        <div style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:10,
          background: apiKey ? "#f0fdf4" : "#fef9c3",

          {apiKey ? "✅ API設定済み" : "⚠️ API未設定"}
        </div>
      </div>

        {tab==="record"   && RecordTab()}

      {/* ボトムナビ */}
      <div style={{background:"#fff",borderTop:"1px solid #f1f5f9",
        display:"flex",flexShrink:0,
        paddingBottom:"env(safe-area-inset-bottom,0px)",
        boxShadow:"0 -1px 0 #f1f5f9"}}>
        {TABS.map(({id,icon,label})=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:"10px 0 10px",border:"none",background:"transparent",
              cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              borderTop: tab===id ? "2.5px solid #22c55e" : "2.5px solid transparent",
              transition:"border-color 0.2s"}}>
            <span style={{fontSize:20,filter:tab===id?"none":"grayscale(1) opacity(0.5)"}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:tab===id?700:500,
              color:tab===id?"#16a34a":"#94a3b8",letterSpacing:"0.02em"}}>{label}</span>
          </button>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
